#cloud-config
#
# VPS — Hetzner Cloud-Init Configuration
#
# Author: Fernando Covecino
#
# Provisions an Ubuntu server with a hardened base configuration.
# Paste the entire contents of this file into the "Cloud config" text
# box when creating a new server in the Hetzner Cloud Console.
#
# What it does (in order):
#   1. Creates an admin user with SSH key-only access
#   2. Hardens SSH (no root login, no passwords, AllowUsers)
#   3. Configures journald, cron, and unattended-upgrades
#   4. Runs webfiable-bootstrap.sh via runcmd, which:
#      - Enables UFW with ports 22, 80, and 443
#   5. Powers off the server to signal that provisioning is complete
#
# ⚠️  IMPORTANT: Replace the ssh-rsa public key in "ssh_authorized_keys"
#    with your own before using this file.
#
# After first boot:
#   1. Start the server from the Hetzner Console
#   2. SSH in:  ssh wfroot-n5i9y@<server-ip>
#   3. Verify:  sudo ./check-cloud-init.sh
#
# Files deployed:
#   /etc/ssh/sshd_config.d/20-webfiable-hardening.conf  — SSH hardening
#   /etc/systemd/journald.conf.d/60-webfiable.conf      — persistent journal
#   /etc/cron.allow                                      — cron whitelist
#   /etc/apt/apt.conf.d/52unattended-upgrades-webfiable  — auto-updates
#   /home/wfroot-n5i9y/check-cloud-init.sh              — health check script
#   /usr/local/sbin/webfiable-bootstrap.sh               — main setup logic
#
timezone: Europe/Madrid
manage_etc_hosts: localhost
package_update: true
package_upgrade: true
package_reboot_if_required: false
ssh_pwauth: false

users:
  - name: wfroot-n5i9y
    gecos: Webfiable Admin
    groups: [users, sudo]
    sudo: "ALL=(ALL) NOPASSWD:ALL"
    shell: /bin/bash
    lock_passwd: true
    ssh_authorized_keys:
      - ssh-rsa  root@correo

packages:
  - openssh-server
  - ufw
  - curl
  - ca-certificates
  - unattended-upgrades

write_files:
  - path: /etc/ssh/sshd_config.d/20-webfiable-hardening.conf
    owner: root:root
    permissions: '0644'
    content: |
      PermitRootLogin no
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      ChallengeResponseAuthentication no
      PubkeyAuthentication yes
      MaxAuthTries 3
      X11Forwarding no
      AllowUsers wfroot-n5i9y

  - path: /etc/systemd/journald.conf.d/60-webfiable.conf
    owner: root:root
    permissions: '0644'
    content: |
      [Journal]
      Storage=persistent
      Compress=yes

  - path: /etc/cron.allow
    owner: root:root
    permissions: '0640'
    content: |
      root
      wfroot-n5i9y

  - path: /etc/apt/apt.conf.d/52unattended-upgrades-webfiable
    owner: root:root
    permissions: '0644'
    content: |
      Unattended-Upgrade::Allowed-Origins {
              "${distro_id}:${distro_codename}-security";
              "${distro_id}ESMApps:${distro_codename}-apps-security";
              "${distro_id}ESM:${distro_codename}-infra-security";
      };

      Unattended-Upgrade::Automatic-Reboot "true";
      Unattended-Upgrade::Automatic-Reboot-WithUsers "true";
      Unattended-Upgrade::Automatic-Reboot-Time "03:30";

  - path: /home/wfroot-n5i9y/check-cloud-init.sh
    owner: root:root
    permissions: '0755'
    defer: true
    content: |
      #!/usr/bin/env bash
      set -uo pipefail

      #######################################
      # cloud-init Health Check
      #######################################
      #
      # Author:     Fernando Covecino
      # Date:       2026-03-15
      # Context:    Diagnostic script to verify that cloud-init
      #             (webfiable-bootstrap.sh) executed correctly on an
      #             Ubuntu server.
      #
      # Companion to: cloud-init.yaml (initial provisioning)
      #
      # USO:
      #   sudo ./check-cloud-init.sh
      #
      # The script checks 9 areas:
      #   1.  System user and SSH keys
      #   2.  SSH hardening
      #   3.  Firewall (UFW)
      #   4.  Timezone
      #   5.  Journald
      #   6.  Cron
      #   7.  Automatic updates
      #   8.  Cleanup (apport)
      #   9.  Cloud-init status
      #
      # EXIT CODE:
      #   0 = all OK
      #   N = number of failed checks
      #
      #######################################

      TARGET_USER="wfroot-n5i9y"

      #######################################
      # Colors
      #######################################

      G="\033[1;32m"   # green
      R="\033[1;31m"   # red
      Y="\033[1;33m"   # yellow
      B="\033[1;34m"   # blue
      C="\033[1;36m"   # cyan
      M="\033[1;35m"   # magenta
      W="\033[1;37m"   # white
      DIM="\033[2m"    # dim
      X="\033[0m"      # reset

      #######################################
      # Counters
      #######################################

      PASS=0
      FAIL=0
      WARN=0

      #######################################
      # Utilities
      #######################################

      banner() {
        echo
        echo -e "${M}╔══════════════════════════════════════════════════════════╗${X}"
        echo -e "${M}║${X}  ${C}🔍 Cloud-Init Health Check${X}                              ${M}║${X}"
        echo -e "${M}╚══════════════════════════════════════════════════════════╝${X}"
        echo
      }

      section() {
        echo
        echo -e "${M}━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━${X}"
        echo -e "${B}$*${X}"
        echo -e "${M}━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━${X}"
      }

      pass() {
        echo -e "   ${G}✅ $*${X}"
        ((PASS++))
      }

      fail() {
        echo -e "   ${R}💀 $*${X}"
        ((FAIL++))
      }

      warning() {
        echo -e "   ${Y}⚠️  $*${X}"
        ((WARN++))
      }

      detail() {
        echo -e "   ${DIM}   ↳ $*${X}"
      }

      check_cmd() {
        local label="$1"
        local cmd="$2"
        if command -v "$cmd" >/dev/null 2>&1; then
          pass "$label"
        else
          fail "$label — command '$cmd' not found"
        fi
      }

      check_service() {
        local label="$1"
        local svc="$2"
        if systemctl is-active --quiet "$svc" 2>/dev/null; then
          pass "$label"
        else
          fail "$label — service '$svc' is not active"
        fi
      }

      check_file() {
        local label="$1"
        local path="$2"
        if [[ -f "$path" ]]; then
          pass "$label"
        else
          fail "$label — does not exist: $path"
        fi
      }

      check_file_contains() {
        local label="$1"
        local path="$2"
        local pattern="$3"
        if [[ -f "$path" ]] && grep -qE "$pattern" "$path" 2>/dev/null; then
          pass "$label"
        else
          fail "$label"
          detail "Expected '$pattern' in $path"
        fi
      }

      #######################################
      # Permissions
      #######################################

      banner

      if [[ $EUID -ne 0 ]]; then
        echo -e "${R}   This script must be run with sudo.${X}"
        exit 1
      fi

      #######################################
      # 1. System user
      #######################################

      section "👤 System user"

      if id "${TARGET_USER}" >/dev/null 2>&1; then
        pass "User '${TARGET_USER}' exists"
      else
        fail "User '${TARGET_USER}' does NOT exist"
      fi

      if groups "${TARGET_USER}" 2>/dev/null | grep -q sudo; then
        pass "User in sudo group"
      else
        fail "User is NOT in sudo group"
      fi

      if [[ -d "/home/${TARGET_USER}/.ssh" ]]; then
        pass ".ssh directory exists"
        if [[ -f "/home/${TARGET_USER}/.ssh/authorized_keys" ]]; then
          key_count=$(wc -l < "/home/${TARGET_USER}/.ssh/authorized_keys")
          pass "authorized_keys present (${key_count} key(s))"
        else
          fail "authorized_keys does not exist"
        fi
      else
        fail ".ssh directory does not exist"
      fi

      #######################################
      # 2. SSH hardening
      #######################################

      section "🔒 Hardening SSH"

      SSH_CONF="/etc/ssh/sshd_config.d/20-webfiable-hardening.conf"
      check_file "Custom SSH config" "$SSH_CONF"
      check_file_contains "PermitRootLogin no" "$SSH_CONF" "^PermitRootLogin no"
      check_file_contains "PasswordAuthentication no" "$SSH_CONF" "^PasswordAuthentication no"
      check_file_contains "PubkeyAuthentication yes" "$SSH_CONF" "^PubkeyAuthentication yes"
      check_file_contains "AllowUsers ${TARGET_USER}" "$SSH_CONF" "^AllowUsers ${TARGET_USER}"
      check_service "SSH service active" "ssh"

      if sshd -t 2>/dev/null; then
        pass "SSH configuration valid (sshd -t)"
      else
        fail "sshd -t returned errors"
      fi

      #######################################
      # 3. Firewall
      #######################################

      section "🧱 Firewall (UFW)"

      if ufw status | grep -q "Status: active"; then
        pass "UFW active"
      else
        fail "UFW is not active"
      fi

      for port_proto in "22/tcp" "80/tcp" "443/tcp" "443/udp"; do
        port_num="${port_proto%%/*}"
        proto="${port_proto##*/}"
        if ufw status | grep -qE "${port_num}/${proto}.*ALLOW"; then
          pass "Port ${port_proto} allowed"
        else
          fail "Port ${port_proto} NOT found in rules"
        fi
      done

      #######################################
      # 4. Timezone
      #######################################

      section "🕐 Timezone"

      current_tz=$(timedatectl show --property=Timezone --value 2>/dev/null || cat /etc/timezone 2>/dev/null || echo "unknown")
      if [[ "$current_tz" == "Europe/Madrid" ]]; then
        pass "Timezone: Europe/Madrid"
      else
        fail "Expected timezone: Europe/Madrid — actual: ${current_tz}"
      fi

      #######################################
      # 5. Journald
      #######################################

      section "📝 Journald"

      JOURNALD_CONF="/etc/systemd/journald.conf.d/60-webfiable.conf"
      check_file "Custom journald config" "$JOURNALD_CONF"
      check_file_contains "Storage=persistent" "$JOURNALD_CONF" "^Storage=persistent"
      check_file_contains "Compress=yes" "$JOURNALD_CONF" "^Compress=yes"

      #######################################
      # 6. Cron
      #######################################

      section "⏰ Cron"

      check_file "/etc/cron.allow exists" "/etc/cron.allow"
      check_file_contains "root in cron.allow" "/etc/cron.allow" "^root$"
      check_file_contains "${TARGET_USER} in cron.allow" "/etc/cron.allow" "^${TARGET_USER}$"

      if [[ ! -f /etc/cron.deny ]]; then
        pass "cron.deny removed"
      else
        warning "cron.deny still exists"
      fi

      #######################################
      # 7. Unattended upgrades
      #######################################

      section "🔄 Automatic updates"

      check_cmd "unattended-upgrade available" "unattended-upgrade"

      UA_CONF="/etc/apt/apt.conf.d/52unattended-upgrades-webfiable"
      check_file "Unattended-upgrades config" "$UA_CONF"
      check_file_contains "Automatic-Reboot true" "$UA_CONF" 'Automatic-Reboot "true"'
      check_file_contains "Reboot at 03:30" "$UA_CONF" 'Automatic-Reboot-Time "03:30"'

      AUTO_CONF="/etc/apt/apt.conf.d/20auto-upgrades"
      check_file "Auto-upgrades config" "$AUTO_CONF"

      for timer in apt-daily.timer apt-daily-upgrade.timer; do
        if systemctl is-enabled --quiet "$timer" 2>/dev/null; then
          pass "Timer enabled: ${timer}"
        else
          warning "Timer not enabled: ${timer}"
        fi
      done

      #######################################
      # 8. Cleanup
      #######################################

      section "🧹 Cleanup"

      if dpkg -l apport 2>/dev/null | grep -q "^ii"; then
        warning "apport still installed"
      else
        pass "apport removed"
      fi

      #######################################
      # 9. Cloud-init
      #######################################

      section "☁️  Cloud-init"

      if [[ -f /var/log/cloud-init-output.log ]]; then
        pass "cloud-init log exists"

        if tail -50 /var/log/cloud-init-output.log | grep -q "Bootstrap completed successfully"; then
          pass "Bootstrap reported success"
        else
          fail "Bootstrap success message not found"
          detail "Check: tail -100 /var/log/cloud-init-output.log"
        fi
      else
        warning "cloud-init log not found"
      fi

      ci_status=$(cloud-init status 2>/dev/null | grep -oP '\b(done|error|running|recoverable error)\b' | head -1 || true)
      : "${ci_status:=unknown}"
      if [[ "$ci_status" == "done" ]]; then
        pass "cloud-init status: done"
      elif [[ "$ci_status" == "error" ]]; then
        fail "cloud-init status: error"
        detail "Run: cloud-init status --long"
      else
        warning "cloud-init status: ${ci_status}"
      fi

      #######################################
      # Summary
      #######################################

      echo
      echo -e "${M}━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━${X}"
      echo

      TOTAL=$((PASS + FAIL + WARN))

      if [[ $FAIL -eq 0 && $WARN -eq 0 ]]; then
        echo -e "${G}╔══════════════════════════════════════════════════════════╗${X}"
        echo -e "${G}║${X}  ${G}🎉 ALL PERFECT! ${TOTAL}/${TOTAL} checks passed${X}                     ${G}║${X}"
        echo -e "${G}╚══════════════════════════════════════════════════════════╝${X}"
      elif [[ $FAIL -eq 0 ]]; then
        echo -e "${Y}╔══════════════════════════════════════════════════════════╗${X}"
        echo -e "${Y}║${X}  ${G}✅ ${PASS} passed${X}  ${Y}⚠️  ${WARN} warnings${X}  ${DIM}(0 failures)${X}            ${Y}║${X}"
        echo -e "${Y}╚══════════════════════════════════════════════════════════╝${X}"
      else
        echo -e "${R}╔══════════════════════════════════════════════════════════╗${X}"
        echo -e "${R}║${X}  ${G}✅ ${PASS} passed${X}  ${Y}⚠️  ${WARN} warnings${X}  ${R}💀 ${FAIL} FAILURES${X}        ${R}║${X}"
        echo -e "${R}╚══════════════════════════════════════════════════════════╝${X}"
      fi

      echo
      exit $FAIL

  - path: /usr/local/sbin/webfiable-bootstrap.sh
    owner: root:root
    permissions: '0750'
    content: |
      #!/usr/bin/env bash
      # Author: Fernando Covecino
      # https://webfiable.com
      set -Eeuo pipefail
      export DEBIAN_FRONTEND=noninteractive

      log() {
        printf '[webfiable-bootstrap] %s\n' "$*"
      }

      BOOTSTRAP_OK=false

      trap 'log "ERROR at line ${LINENO:-?} — aborting bootstrap."' ERR
      trap 'if [[ "$BOOTSTRAP_OK" == "true" ]]; then log "Bootstrap completed successfully."; else log "Bootstrap DID NOT complete — run check-cloud-init.sh for details."; fi' EXIT
      trap 'log "Received SIGTERM — aborting bootstrap."; exit 143' TERM

      require_cmd() {
        command -v "$1" >/dev/null 2>&1 || {
          log "Missing command: $1"
          exit 1
        }
      }

      require_cmd curl
      require_cmd ufw
      require_cmd systemctl

      install -d -m 0755 -o root -g root /run/sshd

      if command -v sshd >/dev/null 2>&1; then
        sshd -t
        systemctl restart ssh.service || systemctl restart ssh
      fi

      systemctl restart systemd-journald.service || true

      ufw --force reset
      ufw default deny incoming
      ufw default deny routed
      ufw default allow outgoing
      ufw allow in on lo
      ufw allow out on lo
      ufw deny in from 127.0.0.0/8
      ufw deny in from ::1
      ufw allow 22/tcp
      ufw allow 80/tcp
      ufw allow 443/tcp
      ufw allow 443/udp
      ufw --force enable

      rm -f /etc/cron.deny
      chown root:root /etc/cron.allow
      chmod 0640 /etc/cron.allow

      require_cmd unattended-upgrade

      apt-get -y purge apport || true
      apt-get -y autoremove --purge

      cat >/etc/apt/apt.conf.d/20auto-upgrades <<'EOF'
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      EOF

      chmod 0644 /etc/apt/apt.conf.d/20auto-upgrades

      systemctl enable apt-daily.timer apt-daily-upgrade.timer >/dev/null 2>&1 || true
      systemctl start apt-daily.timer apt-daily-upgrade.timer >/dev/null 2>&1 || true

      timeout 120 unattended-upgrade --dry-run --debug >/var/log/unattended-upgrades-dry-run.log 2>&1 || true

      BOOTSTRAP_OK=true

runcmd:
  - [timeout, --kill-after=60, '1200', bash, -lc, '/usr/local/sbin/webfiable-bootstrap.sh']
  - [chown, 'wfroot-n5i9y:wfroot-n5i9y', '/home/wfroot-n5i9y/check-cloud-init.sh']

power_state:
  delay: now
  mode: poweroff
  message: Powering off after cloud-init
  timeout: 120
  condition: true
