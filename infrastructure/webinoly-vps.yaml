#cloud-config
timezone: Europe/Madrid
manage_etc_hosts: localhost
package_update: true
package_upgrade: true
package_reboot_if_required: false
ssh_pwauth: false

users:
  - name: wfroot-n5i9y
    gecos: Webfiable Admin
    groups: [users, sudo]
    sudo: "ALL=(ALL) NOPASSWD:ALL"
    shell: /bin/bash
    lock_passwd: true
    ssh_authorized_keys:
      - ssh-rsa  root@correo

packages:
  - openssh-server
  - ufw
  - curl
  - ca-certificates
  - unattended-upgrades

write_files:
  - path: /etc/ssh/sshd_config.d/20-webfiable-hardening.conf
    owner: root:root
    permissions: '0644'
    content: |
      PermitRootLogin no
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      ChallengeResponseAuthentication no
      PubkeyAuthentication yes
      MaxAuthTries 3
      X11Forwarding no
      AllowUsers wfroot-n5i9y

  - path: /etc/systemd/journald.conf.d/60-webfiable.conf
    owner: root:root
    permissions: '0644'
    content: |
      [Journal]
      Storage=persistent
      Compress=yes

  - path: /etc/cron.allow
    owner: root:root
    permissions: '0640'
    content: |
      root
      wfroot-n5i9y

  - path: /etc/apt/apt.conf.d/52unattended-upgrades-webfiable
    owner: root:root
    permissions: '0644'
    content: |
      Unattended-Upgrade::Allowed-Origins {
              "${distro_id}:${distro_codename}-security";
              "${distro_id}ESMApps:${distro_codename}-apps-security";
              "${distro_id}ESM:${distro_codename}-infra-security";
      };

      Unattended-Upgrade::Automatic-Reboot "true";
      Unattended-Upgrade::Automatic-Reboot-WithUsers "true";
      Unattended-Upgrade::Automatic-Reboot-Time "03:30";

  - path: /home/wfroot-n5i9y/check-cloud-init.sh
    owner: root:root
    permissions: '0755'
    defer: true
    content: |
      #!/usr/bin/env bash
      set -uo pipefail

      #######################################
      # cloud-init Health Check
      #######################################
      #
      # Creado por: Claude (Anthropic) — sesión con Fernando
      # Fecha:      2026-03-15
      # Contexto:   Script de diagnóstico para verificar que el cloud-init
      #             (webfiable-bootstrap.sh) se ejecutó correctamente en un
      #             servidor Ubuntu con Webinoly (LEMP stack).
      #
      # Compañero de: cloud-init.yaml (provisioning inicial)
      #               install-openclaw-webinoly.sh (instalación de OpenClaw)
      #
      # USO:
      #   sudo ./check-cloud-init.sh
      #
      # El script verifica 14 áreas:
      #   1.  Usuario del sistema y claves SSH
      #   2.  Hardening SSH
      #   3.  Firewall (UFW)
      #   4.  Timezone
      #   5.  Journald
      #   6.  Cron
      #   7.  Webinoly (comandos y configuración)
      #   8.  Nginx
      #   9.  PHP / PHP-FPM
      #   10. MariaDB / MySQL
      #   11. Sitio por defecto, tools port, blackhole
      #   12. Actualizaciones automáticas
      #   13. Limpieza (apport)
      #   14. Estado de cloud-init
      #
      # EXIT CODE:
      #   0 = todo OK
      #   N = número de checks fallidos
      #
      #######################################

      TARGET_USER="wfroot-n5i9y"
      TOOLS_PORT="4005"

      #######################################
      # Colores
      #######################################

      G="\033[1;32m"   # green
      R="\033[1;31m"   # red
      Y="\033[1;33m"   # yellow
      B="\033[1;34m"   # blue
      C="\033[1;36m"   # cyan
      M="\033[1;35m"   # magenta
      W="\033[1;37m"   # white
      DIM="\033[2m"    # dim
      X="\033[0m"      # reset

      #######################################
      # Contadores
      #######################################

      PASS=0
      FAIL=0
      WARN=0

      #######################################
      # Utilidades
      #######################################

      banner() {
        echo
        echo -e "${M}╔══════════════════════════════════════════════════════════╗${X}"
        echo -e "${M}║${X}  ${C}🔍 Cloud-Init Health Check${X}                              ${M}║${X}"
        echo -e "${M}╚══════════════════════════════════════════════════════════╝${X}"
        echo
      }

      section() {
        echo
        echo -e "${M}━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━${X}"
        echo -e "${B}$*${X}"
        echo -e "${M}━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━${X}"
      }

      pass() {
        echo -e "   ${G}✅ $*${X}"
        ((PASS++))
      }

      fail() {
        echo -e "   ${R}💀 $*${X}"
        ((FAIL++))
      }

      warning() {
        echo -e "   ${Y}⚠️  $*${X}"
        ((WARN++))
      }

      detail() {
        echo -e "   ${DIM}   ↳ $*${X}"
      }

      check_cmd() {
        local label="$1"
        local cmd="$2"
        if command -v "$cmd" >/dev/null 2>&1; then
          pass "$label"
        else
          fail "$label — comando '$cmd' no encontrado"
        fi
      }

      check_service() {
        local label="$1"
        local svc="$2"
        if systemctl is-active --quiet "$svc" 2>/dev/null; then
          pass "$label"
        else
          fail "$label — servicio '$svc' no está activo"
        fi
      }

      check_file() {
        local label="$1"
        local path="$2"
        if [[ -f "$path" ]]; then
          pass "$label"
        else
          fail "$label — no existe: $path"
        fi
      }

      check_file_contains() {
        local label="$1"
        local path="$2"
        local pattern="$3"
        if [[ -f "$path" ]] && grep -qE "$pattern" "$path" 2>/dev/null; then
          pass "$label"
        else
          fail "$label"
          detail "Esperaba '$pattern' en $path"
        fi
      }

      #######################################
      # Permisos
      #######################################

      banner

      if [[ $EUID -ne 0 ]]; then
        echo -e "${R}   Este script debe ejecutarse con sudo.${X}"
        exit 1
      fi

      #######################################
      # 1. Usuario del sistema
      #######################################

      section "👤 Usuario del sistema"

      if id "${TARGET_USER}" >/dev/null 2>&1; then
        pass "Usuario '${TARGET_USER}' existe"
      else
        fail "Usuario '${TARGET_USER}' NO existe"
      fi

      if groups "${TARGET_USER}" 2>/dev/null | grep -q sudo; then
        pass "Usuario en grupo sudo"
      else
        fail "Usuario NO está en grupo sudo"
      fi

      if [[ -d "/home/${TARGET_USER}/.ssh" ]]; then
        pass "Directorio .ssh existe"
        if [[ -f "/home/${TARGET_USER}/.ssh/authorized_keys" ]]; then
          key_count=$(wc -l < "/home/${TARGET_USER}/.ssh/authorized_keys")
          pass "authorized_keys presente (${key_count} clave(s))"
        else
          fail "authorized_keys no existe"
        fi
      else
        fail "Directorio .ssh no existe"
      fi

      #######################################
      # 2. SSH hardening
      #######################################

      section "🔒 Hardening SSH"

      SSH_CONF="/etc/ssh/sshd_config.d/20-webfiable-hardening.conf"
      check_file "Config SSH personalizada" "$SSH_CONF"
      check_file_contains "PermitRootLogin no" "$SSH_CONF" "^PermitRootLogin no"
      check_file_contains "PasswordAuthentication no" "$SSH_CONF" "^PasswordAuthentication no"
      check_file_contains "PubkeyAuthentication yes" "$SSH_CONF" "^PubkeyAuthentication yes"
      check_file_contains "AllowUsers ${TARGET_USER}" "$SSH_CONF" "^AllowUsers ${TARGET_USER}"
      check_service "Servicio SSH activo" "ssh"

      if sshd -t 2>/dev/null; then
        pass "Configuración SSH válida (sshd -t)"
      else
        fail "sshd -t devuelve errores"
      fi

      #######################################
      # 3. Firewall
      #######################################

      section "🧱 Firewall (UFW)"

      if ufw status | grep -q "Status: active"; then
        pass "UFW activo"
      else
        fail "UFW no está activo"
      fi

      for port_proto in "22/tcp" "80/tcp" "443/tcp" "443/udp" "${TOOLS_PORT}/tcp"; do
        port_num="${port_proto%%/*}"
        proto="${port_proto##*/}"
        if ufw status | grep -qE "${port_num}/${proto}.*ALLOW"; then
          pass "Puerto ${port_proto} permitido"
        else
          fail "Puerto ${port_proto} NO encontrado en reglas"
        fi
      done

      #######################################
      # 4. Timezone
      #######################################

      section "🕐 Timezone"

      current_tz=$(timedatectl show --property=Timezone --value 2>/dev/null || cat /etc/timezone 2>/dev/null || echo "desconocida")
      if [[ "$current_tz" == "Europe/Madrid" ]]; then
        pass "Timezone: Europe/Madrid"
      else
        fail "Timezone esperada: Europe/Madrid — actual: ${current_tz}"
      fi

      #######################################
      # 5. Journald
      #######################################

      section "📝 Journald"

      JOURNALD_CONF="/etc/systemd/journald.conf.d/60-webfiable.conf"
      check_file "Config journald personalizada" "$JOURNALD_CONF"
      check_file_contains "Storage=persistent" "$JOURNALD_CONF" "^Storage=persistent"
      check_file_contains "Compress=yes" "$JOURNALD_CONF" "^Compress=yes"

      #######################################
      # 6. Cron
      #######################################

      section "⏰ Cron"

      check_file "/etc/cron.allow existe" "/etc/cron.allow"
      check_file_contains "root en cron.allow" "/etc/cron.allow" "^root$"
      check_file_contains "${TARGET_USER} en cron.allow" "/etc/cron.allow" "^${TARGET_USER}$"

      if [[ ! -f /etc/cron.deny ]]; then
        pass "cron.deny eliminado"
      else
        warning "cron.deny todavía existe"
      fi

      #######################################
      # 7. Webinoly
      #######################################

      section "🌐 Webinoly"

      check_cmd "Comando: webinoly" "webinoly"
      check_cmd "Comando: site" "site"
      check_cmd "Comando: stack" "stack"
      check_cmd "Comando: httpauth" "httpauth"

      WEBINOLY_CONF="/opt/webinoly/webinoly.conf"
      check_file "webinoly.conf existe" "$WEBINOLY_CONF"

      if [[ -f "$WEBINOLY_CONF" ]]; then
        check_file_contains "nginx-ppa: mainline" "$WEBINOLY_CONF" "^nginx-ppa:mainline"
        check_file_contains "timezone: Europe/Madrid" "$WEBINOLY_CONF" "^timezone:Europe/Madrid"
        check_file_contains "max-mb-uploads: 20" "$WEBINOLY_CONF" "^max-mb-uploads:20"
        check_file_contains "wp-admin-auth: false" "$WEBINOLY_CONF" "^wp-admin-auth:false"
        check_file_contains "php-max-mem: 256" "$WEBINOLY_CONF" "^php-max-mem:256"
        check_file_contains "php-pm: dynamic" "$WEBINOLY_CONF" "^php-pm:dynamic"
        check_file_contains "php-max-child: 15" "$WEBINOLY_CONF" "^php-max-child:15"
      fi

      #######################################
      # 8. Nginx
      #######################################

      section "🚀 Nginx"

      check_cmd "Binario nginx instalado" "nginx"
      check_service "Servicio nginx activo" "nginx"

      if command -v nginx >/dev/null 2>&1; then
        nginx_ver=$(nginx -v 2>&1 | grep -oP '[\d.]+')
        pass "Versión nginx: ${nginx_ver}"

        if nginx -t 2>/dev/null; then
          pass "Configuración nginx válida (nginx -t)"
        else
          fail "nginx -t devuelve errores"
        fi
      fi

      if [[ -d /etc/nginx/sites-enabled ]]; then
        site_count=$(find /etc/nginx/sites-enabled -maxdepth 1 -type f -o -type l | wc -l)
        pass "Sitios habilitados: ${site_count}"
      else
        fail "Directorio sites-enabled no existe"
      fi

      #######################################
      # 9. PHP
      #######################################

      section "🐘 PHP"

      php_bin=$(command -v php 2>/dev/null || true)
      if [[ -n "$php_bin" ]]; then
        php_ver=$(php -v 2>/dev/null | head -1 | grep -oP '[\d.]+' | head -1)
        pass "PHP instalado: ${php_ver}"
      else
        fail "PHP no instalado"
      fi

      php_fpm_svc=$(systemctl list-units --type=service --state=running 2>/dev/null | grep -oP 'php[\d.]+-fpm\.service' | head -1 || true)
      if [[ -n "$php_fpm_svc" ]]; then
        pass "PHP-FPM activo: ${php_fpm_svc}"
      else
        fail "PHP-FPM no está corriendo"
      fi

      #######################################
      # 10. MariaDB / MySQL
      #######################################

      section "🗄️  Base de datos"

      if command -v mariadb >/dev/null 2>&1 || command -v mysql >/dev/null 2>&1; then
        db_bin=$(command -v mariadb 2>/dev/null || command -v mysql)
        db_ver=$("$db_bin" --version 2>/dev/null | head -1)
        pass "Cliente DB disponible"
        detail "${db_ver}"
      else
        fail "No se encontró cliente MariaDB/MySQL"
      fi

      for svc in mariadb mysql mysqld; do
        if systemctl is-active --quiet "$svc" 2>/dev/null; then
          pass "Servicio DB activo: ${svc}"
          break
        fi
      done

      #######################################
      # 11. Webinoly: default site & tools
      #######################################

      section "🔧 Webinoly: sitio por defecto y herramientas"

      FQDN=$(hostname -f 2>/dev/null || echo "")
      if [[ -n "$FQDN" ]]; then
        pass "FQDN detectado: ${FQDN}"

        if [[ -e "/etc/nginx/sites-enabled/${FQDN}" ]] || [[ -e "/var/www/${FQDN}" ]]; then
          pass "Sitio HTML para ${FQDN} existe"
        else
          fail "Sitio para ${FQDN} no encontrado"
        fi
      else
        warning "No se pudo obtener FQDN"
      fi

      # Tools port
      if [[ -f "$WEBINOLY_CONF" ]] && grep -qE "^tools-port-set:${TOOLS_PORT}" "$WEBINOLY_CONF" 2>/dev/null; then
        pass "Tools port configurado: ${TOOLS_PORT}"
      else
        if ss -tlnp | grep -q ":${TOOLS_PORT}" 2>/dev/null; then
          pass "Puerto ${TOOLS_PORT} escuchando (tools)"
        else
          warning "Tools port ${TOOLS_PORT} — no confirmado en config ni escuchando"
        fi
      fi

      # Default site blackhole
      if [[ -f "$WEBINOLY_CONF" ]] && grep -qE "^default-response:blackhole" "$WEBINOLY_CONF" 2>/dev/null; then
        pass "Default site: blackhole"
      else
        warning "Default site no configurado como blackhole"
      fi

      #######################################
      # 12. Unattended upgrades
      #######################################

      section "🔄 Actualizaciones automáticas"

      check_cmd "unattended-upgrade disponible" "unattended-upgrade"

      UA_CONF="/etc/apt/apt.conf.d/52unattended-upgrades-webfiable"
      check_file "Config unattended-upgrades" "$UA_CONF"
      check_file_contains "Automatic-Reboot true" "$UA_CONF" 'Automatic-Reboot "true"'
      check_file_contains "Reboot a las 03:30" "$UA_CONF" 'Automatic-Reboot-Time "03:30"'

      AUTO_CONF="/etc/apt/apt.conf.d/20auto-upgrades"
      check_file "Config auto-upgrades" "$AUTO_CONF"

      for timer in apt-daily.timer apt-daily-upgrade.timer; do
        if systemctl is-enabled --quiet "$timer" 2>/dev/null; then
          pass "Timer habilitado: ${timer}"
        else
          warning "Timer no habilitado: ${timer}"
        fi
      done

      #######################################
      # 13. Limpieza
      #######################################

      section "🧹 Limpieza"

      if dpkg -l apport 2>/dev/null | grep -q "^ii"; then
        warning "apport todavía instalado"
      else
        pass "apport eliminado"
      fi

      #######################################
      # 14. Cloud-init
      #######################################

      section "☁️  Cloud-init"

      if [[ -f /var/log/cloud-init-output.log ]]; then
        pass "Log de cloud-init existe"

        if tail -50 /var/log/cloud-init-output.log | grep -q "Bootstrap completed successfully"; then
          pass "Bootstrap reportó éxito"
        else
          fail "No se encontró mensaje de éxito del bootstrap"
          detail "Revisa: tail -100 /var/log/cloud-init-output.log"
        fi
      else
        warning "Log de cloud-init no encontrado"
      fi

			ci_status=$(cloud-init status 2>/dev/null | grep -oP '\b(done|error|running|recoverable error)\b' | head -1 || echo "desconocido")
      if [[ "$ci_status" == "done" ]]; then
        pass "cloud-init status: done"
      elif [[ "$ci_status" == "error" ]]; then
        fail "cloud-init status: error"
        detail "Ejecuta: cloud-init status --long"
      else
        warning "cloud-init status: ${ci_status}"
      fi

      #######################################
      # Resumen
      #######################################

      echo
      echo -e "${M}━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━${X}"
      echo

      TOTAL=$((PASS + FAIL + WARN))

      if [[ $FAIL -eq 0 && $WARN -eq 0 ]]; then
        echo -e "${G}╔══════════════════════════════════════════════════════════╗${X}"
        echo -e "${G}║${X}  ${G}🎉 ¡TODO PERFECTO! ${TOTAL}/${TOTAL} checks pasados${X}                   ${G}║${X}"
        echo -e "${G}╚══════════════════════════════════════════════════════════╝${X}"
      elif [[ $FAIL -eq 0 ]]; then
        echo -e "${Y}╔══════════════════════════════════════════════════════════╗${X}"
        echo -e "${Y}║${X}  ${G}✅ ${PASS} pasados${X}  ${Y}⚠️  ${WARN} warnings${X}  ${DIM}(0 fallos)${X}             ${Y}║${X}"
        echo -e "${Y}╚══════════════════════════════════════════════════════════╝${X}"
      else
        echo -e "${R}╔══════════════════════════════════════════════════════════╗${X}"
        echo -e "${R}║${X}  ${G}✅ ${PASS} pasados${X}  ${Y}⚠️  ${WARN} warnings${X}  ${R}💀 ${FAIL} FALLOS${X}          ${R}║${X}"
        echo -e "${R}╚══════════════════════════════════════════════════════════╝${X}"
      fi

      echo
      exit $FAIL

  - path: /usr/local/sbin/webfiable-bootstrap.sh
    owner: root:root
    permissions: '0750'
    content: |
      #!/usr/bin/env bash
      set -Eeuo pipefail
      export DEBIAN_FRONTEND=noninteractive

      log() {
        printf '[webfiable-bootstrap] %s\n' "$*"
      }

      require_cmd() {
        command -v "$1" >/dev/null 2>&1 || {
          log "Missing command: $1"
          exit 1
        }
      }

      require_cmd curl
      require_cmd ufw
      require_cmd systemctl

      install -d -m 0755 -o root -g root /run/sshd

      if command -v sshd >/dev/null 2>&1; then
        sshd -t
        systemctl restart ssh.service || systemctl restart ssh
      fi

      systemctl restart systemd-journald.service || true

      ufw --force reset
      ufw default deny incoming
      ufw default deny routed
      ufw default allow outgoing
      ufw allow in on lo
      ufw allow out on lo
      ufw deny in from 127.0.0.0/8
      ufw deny in from ::1
      ufw allow 22/tcp
      ufw allow 80/tcp
      ufw allow 443/tcp
      ufw allow 443/udp
      ufw allow 4005/tcp
      ufw --force enable

      rm -f /etc/cron.deny
      chown root:root /etc/cron.allow
      chmod 0640 /etc/cron.allow

      if ! command -v stack >/dev/null 2>&1 || ! command -v webinoly >/dev/null 2>&1; then
        log "Installing Webinoly bootstrap..."
        curl -fsSL https://qrok.es/wy -o /root/weby
        bash /root/weby -clean
      fi

      # Verify Webinoly management commands (installed by -clean)
      require_cmd stack
      require_cmd site
      require_cmd webinoly
      require_cmd httpauth
      require_cmd unattended-upgrade
      # nginx is NOT checked here — it doesn't exist yet.
      # -clean only installs management tools, not packages.
      # nginx gets installed below by stack -lemp.

      WEBINOLY_CONF="/opt/webinoly/webinoly.conf"
      [[ -f "${WEBINOLY_CONF}" ]] || {
        log "Missing ${WEBINOLY_CONF}"
        exit 1
      }

      set_conf_value() {
        local key="$1"
        local value="$2"
        local file="$3"

        if grep -Eq "^[[:space:]]*#?[[:space:]]*${key}:" "$file"; then
          sed -ri "s|^[[:space:]]*#?[[:space:]]*(${key}):.*|\\1:${value}|" "$file"
        else
          printf '%s:%s\n' "$key" "$value" >> "$file"
        fi
      }

      set_conf_value "max-mb-uploads" "20" "${WEBINOLY_CONF}"
      set_conf_value "nginx-ppa" "mainline" "${WEBINOLY_CONF}"
      set_conf_value "timezone" "Europe/Madrid" "${WEBINOLY_CONF}"
      set_conf_value "wp-admin-auth" "false" "${WEBINOLY_CONF}"
      set_conf_value "php-max-mem" "256" "${WEBINOLY_CONF}"
      set_conf_value "php-pm" "dynamic" "${WEBINOLY_CONF}"
      set_conf_value "php-max-child" "15" "${WEBINOLY_CONF}"

      # Install all packages — this is where nginx, PHP, and MariaDB get installed
      stack -lemp

      # NOW verify nginx is present
      require_cmd nginx
      nginx -t

      httpauth '-add=[tools-hd5w,hr5vwUvsur%B3*Bme]'
      webinoly -tools-port=4005

      FQDN="$(hostname -f)"
      [[ -n "${FQDN}" ]] || {
        log "hostname -f returned empty"
        exit 1
      }

      site "${FQDN}" -html
      webinoly "-tools-site=${FQDN}"
      webinoly -default-site=blackhole
      webinoly '-cache-valid=[1d,1d,1m]'

      nginx -t

      apt-get -y purge apport || true
      apt-get -y autoremove --purge

      cat >/etc/apt/apt.conf.d/20auto-upgrades <<'EOF'
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      EOF

      chmod 0644 /etc/apt/apt.conf.d/20auto-upgrades

      systemctl enable apt-daily.timer apt-daily-upgrade.timer >/dev/null 2>&1 || true
      systemctl start apt-daily.timer apt-daily-upgrade.timer >/dev/null 2>&1 || true

      unattended-upgrade --dry-run --debug >/var/log/unattended-upgrades-dry-run.log 2>&1 || true

      log "Bootstrap completed successfully."

runcmd:
  - [bash, -lc, '/usr/local/sbin/webfiable-bootstrap.sh']
  - [chown, 'wfroot-n5i9y:wfroot-n5i9y', '/home/wfroot-n5i9y/check-cloud-init.sh']

power_state:
  delay: now
  mode: poweroff
  message: Powering off after cloud-init
  timeout: 120
  condition: true
